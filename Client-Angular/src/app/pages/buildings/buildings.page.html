@switch(state){

    @case('loading'){
        <app-alert alertState="loading" text="Cargando Edificios..." ></app-alert>
    }

    @case('error'){
        <app-alert alertState="error" text="Error al Cargar los Edificios" ></app-alert>
    }

    @case('success'){
        <app-buildings-table [buildings]="buildings" ></app-buildings-table>
    }

}
